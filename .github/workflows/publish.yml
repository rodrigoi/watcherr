name: Publish Docker Image

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump and tag version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT=$(node -p "require('./package.json').version || '0.0.0'")
          TAG="v$CURRENT"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            IFS='.' read -r major minor patch <<< "$CURRENT"
            NEW_VERSION="$major.$minor.$((patch + 1))"

            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "

            git add package.json
            git commit --amend --no-edit
            git push origin main --force-with-lease

            TAG="v$NEW_VERSION"
          fi

          git tag "$TAG"
          git push origin "$TAG"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v4
        with:
          registry: docker-registry.gandalfelgris.com.ar
          username: ${{ secrets.CF_CLIENT_ID }}
          password: ${{ secrets.CF_CLIENT_SECRET }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            docker-registry.gandalfelgris.com.ar/${{ github.event.repository.name }}:${{ steps.version.outputs.TAG }}
            docker-registry.gandalfelgris.com.ar/${{ github.event.repository.name }}:latest
